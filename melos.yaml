name: system-for-llms
repository: https://github.com/your-org/system-for-llms-monorepo

packages:
  - apps/mobile

scripts:
  analyze:
    run: melos exec -- flutter analyze
    description: Run flutter analyze across all Flutter packages

  test:
    run: melos exec -- flutter test
    description: Run flutter tests across all Flutter packages

  gen:
    run: melos exec -- dart run build_runner build --delete-conflicting-outputs
    description: Run code generation (Riverpod, Freezed, json_serializable)

  clean:
    run: melos exec -- flutter clean
    description: Clean Flutter build artifacts

  format:
    run: melos exec -- dart format .
    description: Format Dart code
