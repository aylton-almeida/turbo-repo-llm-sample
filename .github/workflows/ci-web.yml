name: CI — Web

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/web/**"
      - "packages/**"
      - ".github/workflows/ci-web.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/web/**"
      - "packages/**"
      - ".github/workflows/ci-web.yml"

jobs:
  ci:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint --filter=@mono/web...

      - name: Type-check
        run: pnpm turbo run type-check --filter=@mono/web...

      - name: Build
        run: pnpm turbo run build --filter=@mono/web...
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
